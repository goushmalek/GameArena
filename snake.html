<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Game Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="snake.css">
</head>
<body data-page="game">
    <button class="settings-btn" id="settingsBtn"><span class="settings-icon">⚙️</span></button>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header"><h2>⚙️ Settings</h2><button class="close-btn" id="closeSettings">✕</button></div>
        <div class="settings-content">
            <div class="settings-section"><h3>🎵 Music</h3><div class="music-controls"><button class="music-btn" data-track="1">Track 1</button><button class="music-btn" data-track="2">Track 2</button><button class="music-btn" data-track="3">Track 3</button><button class="music-btn stop-music" id="stopMusic">Stop</button></div><div class="volume-control"><label for="volumeSlider">Volume:</label><input type="range" id="volumeSlider" min="0" max="100" value="50"><span id="volumeValue">50%</span></div></div>
            <div class="settings-section"><h3>🎨 Theme</h3><div class="theme-toggle"><button class="theme-btn active" data-theme="dark">Dark</button><button class="theme-btn" data-theme="light">Light</button></div></div>
            <div class="settings-section"><h3>📊 Statistics</h3><a href="statistics.html" class="statistics-link"><span>📈</span> View Statistics</a></div>
        </div>
    </div>

    <header><a href="index.html" class="back-button">← Back</a><h1>🐍 SNAKE</h1></header>
    
    <main class="game-page-container">
        <div class="game-card single-game snake-game">
            <div class="game-stats">
                <div class="stat"><span>Score</span><span id="score">0</span></div>
                <div class="stat"><span>High Score</span><span id="highScore">0</span></div>
                <div class="stat"><span>Length</span><span id="length">1</span></div>
            </div>
            
            <canvas id="snakeCanvas"></canvas>
            
            <!-- Touch Control Buttons - Simple Row -->
            <div class="snake-touch-controls">
                <div class="controls-title">🎮 Controls</div>
                <div class="snake-arrows-row">
                    <button class="snake-arrow-btn" id="snakeLeftBtn">
                        <span class="arrow-icon">◀</span>
                    </button>
                    <button class="snake-arrow-btn" id="snakeUpBtn">
                        <span class="arrow-icon">▲</span>
                    </button>
                    <button class="snake-arrow-btn" id="snakeDownBtn">
                        <span class="arrow-icon">▼</span>
                    </button>
                    <button class="snake-arrow-btn" id="snakeRightBtn">
                        <span class="arrow-icon">▶</span>
                    </button>
                </div>
            </div>
            
            <div class="game-controls">
                <button id="startBtn" class="control-btn start-btn">START GAME</button>
                <button id="pauseBtn" class="control-btn pause-btn" style="display:none;">PAUSE</button>
            </div>
            
            <div class="instructions">
                <h3>🎮 Controls</h3>
                <div class="control-keys">
                    <div class="key-group">
                        <div class="key">↑</div>
                        <div class="key-row">
                            <div class="key">←</div>
                            <div class="key">↓</div>
                            <div class="key">→</div>
                        </div>
                    </div>
                    <p>Use Arrow Keys or WASD</p>
                </div>
            </div>
            
            <div class="snake-history-section">
                <h3>📜 Best Runs</h3>
                <div id="snakeHistory" class="snake-history"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Game Arena | Made with ❤️ by Mohammad Gouse</p>
    </footer>

    <script src="settings.js"></script>
    <script src="admin.js"></script>
    <script src="snake.js"></script>
</body>
</html>
