<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - Game Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="tetris.css">
</head>
<body data-page="game">
    <button class="settings-btn" id="settingsBtn"><span class="settings-icon">⚙️</span></button>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header"><h2>⚙️ Settings</h2><button class="close-btn" id="closeSettings">✕</button></div>
        <div class="settings-content">
            <div class="settings-section"><h3>🎵 Music</h3><div class="music-controls"><button class="music-btn" data-track="1">Track 1</button><button class="music-btn" data-track="2">Track 2</button><button class="music-btn" data-track="3">Track 3</button><button class="music-btn stop-music" id="stopMusic">Stop</button></div><div class="volume-control"><label for="volumeSlider">Volume:</label><input type="range" id="volumeSlider" min="0" max="100" value="50"><span id="volumeValue">50%</span></div><div class="custom-music-section"><h4>Upload Music</h4><input type="file" id="customMusicUpload" accept="audio/*" multiple style="display:none;"><button class="upload-music-btn" id="uploadMusicBtn">Choose Files</button><div class="custom-playlist" id="customPlaylist"></div></div></div>
            <div class="settings-section"><h3>🎨 Theme</h3><div class="theme-toggle"><button class="theme-btn active" data-theme="dark">Dark</button><button class="theme-btn" data-theme="light">Light</button></div></div>
        </div>
    </div>
    <header><a href="index.html" class="back-button">← Back</a><h1>🟦 TETRIS</h1></header>
    <main class="tetris-main">
        <div class="tetris-left">
            <div class="game-info">
                <div class="info-item"><span>Score</span><span id="score">0</span></div>
                <div class="info-item"><span>Level</span><span id="level">1</span></div>
                <div class="info-item"><span>Lines</span><span id="lines">0</span></div>
            </div>
            <canvas id="tetrisCanvas"></canvas>
            
            <!-- Touch Control Buttons -->
            <div class="tetris-touch-controls">
                <div class="controls-row">
                    <button class="tetris-control-btn" id="rotateBtn">
                        <span class="btn-icon">↻</span>
                        <span class="btn-label">ROTATE</span>
                    </button>
                    <button class="tetris-control-btn" id="dropBtn">
                        <span class="btn-icon">⬇</span>
                        <span class="btn-label">DROP</span>
                    </button>
                </div>
                <div class="controls-row arrow-controls">
                    <button class="tetris-arrow-btn" id="leftBtn">
                        <span class="arrow-icon">◀</span>
                    </button>
                    <button class="tetris-arrow-btn" id="downBtn">
                        <span class="arrow-icon">▼</span>
                    </button>
                    <button class="tetris-arrow-btn" id="rightBtn">
                        <span class="arrow-icon">▶</span>
                    </button>
                </div>
            </div>
            
            <div class="game-controls">
                <button id="startGame" class="game-btn">START</button>
                <button id="pauseGame" class="game-btn pause-btn" style="display:none;">PAUSE</button>
            </div>
        </div>
        <div class="tetris-right">
            <div class="next-box"><h3>Next</h3><div id="nextPieces"></div></div>
            <div class="controls-box"><h3>Controls</h3><p>← Left</p><p>→ Right</p><p>↑ Rotate</p><p>↓ Fast</p><p>Space: Drop</p></div>
        </div>
    </main>

    <footer>
        <p>© 2026 Game Arena | Made with ❤️ by Mohammad Gouse</p>
    </footer>

    <script src="settings.js"></script>
    <script src="admin.js"></script>
    <script src="tetris.js"></script>
</body>
</html>
